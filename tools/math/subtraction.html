<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtraction Practice | Math</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    .board {
      display: inline-block;
      margin-top: 1rem;
      font-family: "Courier New", Courier, monospace;
      font-size: 2rem;
      line-height: 1.3;
      position: relative;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35em;
    }

    .operator {
      width: 1ch;
      margin-right: 0.5ch;
      text-align: center;
    }

    .digits {
      display: grid;
      grid-template-columns: repeat(3, 1.4em);
      gap: 0.2em;
    }

    .digit {
      border: 2px solid #111;
      border-radius: 4px;
      text-align: center;
      min-width: 1.4em;
      position: relative;
    }

    .borrow-row {
      margin-bottom: 0.2em;
    }

    .borrow-input {
      width: 100%;
      border: 1px dashed #666;
      border-radius: 4px;
      text-align: center;
      font: inherit;
      font-size: 0.5em;
      line-height: 1.2;
      padding: 0.1em 0;
      background: #fff;
      box-sizing: border-box;
      letter-spacing: -0.06em;
    }

    .digit.borrow-replaced::before,
    .digit.borrow-replaced::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 10%;
      width: 80%;
      border-top: 2px solid #a1260d;
      transform-origin: center;
      pointer-events: none;
    }

    .digit.borrow-replaced::before {
      transform: rotate(40deg);
    }

    .digit.borrow-replaced::after {
      transform: rotate(-40deg);
    }

    .line {
      margin-top: 0.2rem;
      border-top: 3px solid #111;
      width: calc((1.4em * 3) + (0.2em * 2) + (4px * 3));
      margin-left: calc(1.5ch + 0.35em);
      margin-bottom: 0.25em;
    }

    .result-row .operator {
      width: auto;
      font-size: 0.8em;
      margin-right: 0.4em;
    }

    .result-input {
      width: 100%;
      border: 2px solid #111;
      border-radius: 4px;
      text-align: center;
      font: inherit;
      font-size: 1em;
      line-height: 1.2;
      padding: 0.05em 0;
      background: #fff;
    }

    .actions {
      margin-top: 1rem;
    }

    .action-button {
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .action-link {
      display: inline-block;
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      margin-right: 0.5rem;
      border: 1px solid #111;
      border-radius: 4px;
      color: inherit;
      text-decoration: none;
      background: #f2f2f2;
    }

    .feedback {
      margin-top: 0;
      font-size: 1rem;
      min-height: 1.4em;
      line-height: 1.2;
      position: absolute;
      left: calc(100% + 1rem);
      top: 50%;
      transform: translateY(-50%);
      width: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feedback.success {
      color: #1b7f35;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .feedback.error {
      color: #a1260d;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .feedback.message {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.2;
      width: max-content;
      max-width: 14rem;
      text-align: left;
      justify-content: flex-start;
    }
  </style>
</head>
<body>
  <h1>Subtraction Practice</h1>
  <section class="board" aria-label="Subtraction board">
    <div class="row borrow-row">
      <span class="operator" aria-hidden="true"></span>
      <div class="digits" aria-label="Borrow row">
        <input class="borrow-input" type="text" inputmode="numeric" maxlength="2" aria-label="Borrow for hundreds column" tabindex="4">
        <input class="borrow-input" type="text" inputmode="numeric" maxlength="2" aria-label="Borrow for tens column" tabindex="2">
        <input class="borrow-input" type="text" inputmode="numeric" maxlength="2" aria-label="Borrow for ones column" tabindex="6">
      </div>
    </div>
    <div class="row">
      <span class="operator" aria-hidden="true"></span>
      <div class="digits" id="top-digits" aria-label="Top number"></div>
    </div>
    <div class="row">
      <span class="operator" aria-hidden="true">-</span>
      <div class="digits" id="bottom-digits" aria-label="Bottom number"></div>
    </div>
    <div class="line" aria-hidden="true"></div>
    <div class="row result-row">
      <span class="operator" aria-hidden="true">=</span>
      <div class="digits" aria-label="Result row">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Hundreds digit" tabindex="5">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Tens digit" tabindex="3">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Ones digit" tabindex="1">
      </div>
    </div>
    <p class="feedback" id="feedback" aria-live="polite"></p>
  </section>
  <div class="actions">
    <a class="action-link" href="../../subjects/math.html">Back to Math Menu</a>
    <button type="button" class="action-button" id="check-answer">Check</button>
    <button type="button" class="action-button" id="new-problem">New Problem</button>
  </div>

  <script>
    function randomThreeDigitNumber() {
      return Math.floor(Math.random() * 900) + 100;
    }

    let expectedDifference = 0;
    let currentTopDigits = [];
    let currentBottomDigits = [];

    function renderDigits(containerId, value) {
      const digits = String(value).padStart(3, "0").split("");
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      digits.forEach((digit) => {
        const cell = document.createElement("span");
        cell.className = "digit";
        cell.textContent = digit;
        container.appendChild(cell);
      });
    }

    const borrowInputs = Array.from(document.querySelectorAll(".borrow-input"));
    const resultInputs = Array.from(document.querySelectorAll(".result-input"));
    const checkButton = document.getElementById("check-answer");
    const newProblemButton = document.getElementById("new-problem");
    const feedback = document.getElementById("feedback");

    borrowInputs.forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 2);
        updateBorrowVisualState();
      });
    });

    resultInputs.forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);
      });
    });

    function enableSequenceNavigation(inputSequence) {
      inputSequence.forEach((input, index) => {
        input.addEventListener("input", () => {
          const maxChars = input.maxLength > 0 ? input.maxLength : 1;
          if (input.value.length >= maxChars && index < inputSequence.length - 1) {
            inputSequence[index + 1].focus();
            inputSequence[index + 1].select();
          }
        });

        input.addEventListener("keydown", (event) => {
          if (event.key === "Backspace" && input.value === "" && index > 0) {
            inputSequence[index - 1].focus();
            inputSequence[index - 1].select();
          }
        });
      });
    }

    function clearInputs(inputs) {
      inputs.forEach((input) => {
        input.value = "";
      });
    }

    function getRequiredBorrowColumns() {
      const requiresTensBorrow = currentTopDigits[2] < currentBottomDigits[2];
      const adjustedTensTopDigit = currentTopDigits[1] - (requiresTensBorrow ? 1 : 0);
      const requiresHundredsBorrow = adjustedTensTopDigit < currentBottomDigits[1];

      return {
        hundreds: requiresHundredsBorrow,
        tens: requiresTensBorrow,
      };
    }

    function updateBorrowVisualState() {
      const topDigitCells = Array.from(document.querySelectorAll("#top-digits .digit"));

      borrowInputs.forEach((input, index) => {
        const topDigitCell = topDigitCells[index];
        if (!topDigitCell) {
          return;
        }

        topDigitCell.classList.toggle("borrow-replaced", input.value.trim() !== "");
      });
    }

    function generateProblem() {
      let topNumber = randomThreeDigitNumber();
      let bottomNumber = randomThreeDigitNumber();

      if (topNumber < bottomNumber) {
        const swap = topNumber;
        topNumber = bottomNumber;
        bottomNumber = swap;
      }

      expectedDifference = topNumber - bottomNumber;
      currentTopDigits = String(topNumber).padStart(3, "0").split("").map(Number);
      currentBottomDigits = String(bottomNumber).padStart(3, "0").split("").map(Number);

      renderDigits("top-digits", topNumber);
      renderDigits("bottom-digits", bottomNumber);
      clearInputs(borrowInputs);
      clearInputs(resultInputs);
      updateBorrowVisualState();
      feedback.textContent = "";
      feedback.className = "feedback";
    }

    const entrySequence = [
      resultInputs[2],
      borrowInputs[1],
      resultInputs[1],
      borrowInputs[0],
      resultInputs[0],
    ];

    enableSequenceNavigation(entrySequence);

    checkButton.addEventListener("click", () => {
      const digitValues = resultInputs.map((input) => input.value.trim());

      if (digitValues.some((value) => value === "")) {
        feedback.textContent = "Please fill in all three result boxes.";
        feedback.className = "feedback error message";
        return;
      }

      const requiredBorrowColumns = getRequiredBorrowColumns();
      const hundredsBorrow = borrowInputs[0].value.trim();
      const tensBorrow = borrowInputs[1].value.trim();

      if (
        (requiredBorrowColumns.hundreds && hundredsBorrow === "") ||
        (requiredBorrowColumns.tens && tensBorrow === "")
      ) {
        feedback.textContent = "Please fill in required borrow boxes.";
        feedback.className = "feedback error message";
        return;
      }

      const answerDigits = digitValues.join("");
      const typedAnswer = Number(answerDigits);

      if (typedAnswer === expectedDifference) {
        feedback.textContent = "✓";
        feedback.className = "feedback success";
      } else {
        feedback.textContent = "✗";
        feedback.className = "feedback error";
      }
    });

    newProblemButton.addEventListener("click", () => {
      generateProblem();
      resultInputs[resultInputs.length - 1].focus();
    });

    generateProblem();
  </script>
</body>
</html>
