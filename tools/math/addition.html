<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Addition Practice | Math</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }

    .board {
      display: inline-block;
      margin-top: 1rem;
      font-family: "Courier New", Courier, monospace;
      font-size: 2rem;
      line-height: 1.3;
      position: relative;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35em;
    }

    .operator {
      width: 1ch;
      margin-right: 0.5ch;
      text-align: center;
    }

    .digits {
      display: grid;
      grid-template-columns: repeat(3, 1.4em);
      gap: 0.2em;
    }

    .result-digits {
      grid-template-columns: repeat(4, 1.4em);
    }

    .digit {
      border: 2px solid #111;
      border-radius: 4px;
      text-align: center;
      min-width: 1.4em;
    }

    .carry-row {
      margin-bottom: 0.2em;
    }

    .carry-input {
      width: 100%;
      border: 1px dashed #666;
      border-radius: 4px;
      text-align: center;
      font: inherit;
      font-size: 0.6em;
      line-height: 1.2;
      padding: 0.15em 0;
      background: #fff;
    }

    .carry-empty {
      min-width: 1.4em;
    }

    .line {
      margin-top: 0.2rem;
      border-top: 3px solid #111;
      width: calc((1.4em * 4) + (0.2em * 3) + (4px * 4));
      margin-left: calc(1.5ch + 0.35em);
      margin-bottom: 0.25em;
    }

    .result-row .operator {
      width: auto;
      font-size: 0.8em;
      margin-right: 0.4em;
    }

    .result-input {
      width: 100%;
      border: 2px solid #111;
      border-radius: 4px;
      text-align: center;
      font: inherit;
      font-size: 1em;
      line-height: 1.2;
      padding: 0.05em 0;
      background: #fff;
    }

    .actions {
      margin-top: 1rem;
    }

    .action-button {
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      margin-right: 0.5rem;
    }

    .action-link {
      display: inline-block;
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      margin-right: 0.5rem;
      border: 1px solid #111;
      border-radius: 4px;
      color: inherit;
      text-decoration: none;
      background: #f2f2f2;
    }

    .feedback {
      margin-top: 0;
      font-size: 1rem;
      min-height: 1.4em;
      line-height: 1.2;
      position: absolute;
      left: calc(100% + 1rem);
      top: 50%;
      transform: translateY(-50%);
      width: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feedback.success {
      color: #1b7f35;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .feedback.error {
      color: #a1260d;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .feedback.message {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.2;
      width: max-content;
      max-width: 14rem;
      text-align: left;
      justify-content: flex-start;
    }
  </style>
</head>
<body>
  <h1>Addition Practice</h1>
  <section class="board" aria-label="Addition board">
    <div class="row carry-row">
      <span class="operator" aria-hidden="true"></span>
      <div class="digits" aria-label="Carry row">
        <input class="carry-input" type="text" inputmode="numeric" maxlength="1" aria-label="Carry for hundreds column" tabindex="4">
        <input class="carry-input" type="text" inputmode="numeric" maxlength="1" aria-label="Carry for tens column" tabindex="2">
        <span class="carry-empty" aria-hidden="true"></span>
      </div>
    </div>
    <div class="row">
      <span class="operator" aria-hidden="true"></span>
      <div class="digits" id="top-digits" aria-label="First addend"></div>
    </div>
    <div class="row">
      <span class="operator" aria-hidden="true">+</span>
      <div class="digits" id="bottom-digits" aria-label="Second addend"></div>
    </div>
    <div class="line" aria-hidden="true"></div>
    <div class="row result-row">
      <span class="operator" aria-hidden="true">=</span>
      <div class="digits result-digits" aria-label="Result row">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Thousands digit" tabindex="6">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Hundreds digit" tabindex="5">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Tens digit" tabindex="3">
        <input class="result-input" type="text" inputmode="numeric" maxlength="1" aria-label="Ones digit" tabindex="1">
      </div>
    </div>
    <p class="feedback" id="feedback" aria-live="polite"></p>
  </section>
  <div class="actions">
    <a class="action-link" href="../../subjects/math.html">Back to Math Menu</a>
    <button type="button" class="action-button" id="check-answer">Check</button>
    <button type="button" class="action-button" id="new-problem">New Problem</button>
  </div>

  <script>
    function randomThreeDigitNumber() {
      return Math.floor(Math.random() * 900) + 100;
    }

    let expectedSum = 0;
    let currentTopDigits = [];
    let currentBottomDigits = [];

    function renderDigits(containerId, value) {
      const digits = String(value).padStart(3, "0").split("");
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      digits.forEach((digit) => {
        const cell = document.createElement("span");
        cell.className = "digit";
        cell.textContent = digit;
        container.appendChild(cell);
      });
    }

    const carryInputs = Array.from(document.querySelectorAll(".carry-input"));
    const resultInputs = Array.from(document.querySelectorAll(".result-input"));
    const checkButton = document.getElementById("check-answer");
    const newProblemButton = document.getElementById("new-problem");
    const feedback = document.getElementById("feedback");

    carryInputs.forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);
      });
    });

    resultInputs.forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);
      });
    });

    function enableSequenceNavigation(inputSequence) {
      inputSequence.forEach((input, index) => {
        input.addEventListener("input", () => {
          if (input.value !== "" && index < inputSequence.length - 1) {
            inputSequence[index + 1].focus();
            inputSequence[index + 1].select();
          }
        });

        input.addEventListener("keydown", (event) => {
          if (event.key === "Backspace" && input.value === "" && index > 0) {
            inputSequence[index - 1].focus();
            inputSequence[index - 1].select();
          }
        });
      });
    }

    function clearInputs(inputs) {
      inputs.forEach((input) => {
        input.value = "";
      });
    }

    function getRequiredCarryColumns() {
      const onesSum = currentTopDigits[2] + currentBottomDigits[2];
      const requiresTensCarry = onesSum >= 10;
      const tensSum = currentTopDigits[1] + currentBottomDigits[1] + (requiresTensCarry ? 1 : 0);
      const requiresHundredsCarry = tensSum >= 10;

      return {
        hundreds: requiresHundredsCarry,
        tens: requiresTensCarry,
      };
    }

    function generateProblem() {
      const firstNumber = randomThreeDigitNumber();
      const secondNumber = randomThreeDigitNumber();
      expectedSum = firstNumber + secondNumber;
      currentTopDigits = String(firstNumber).padStart(3, "0").split("").map(Number);
      currentBottomDigits = String(secondNumber).padStart(3, "0").split("").map(Number);

      renderDigits("top-digits", firstNumber);
      renderDigits("bottom-digits", secondNumber);
      clearInputs(carryInputs);
      clearInputs(resultInputs);
      feedback.textContent = "";
      feedback.className = "feedback";
    }

    const entrySequence = [
      resultInputs[3],
      carryInputs[1],
      resultInputs[2],
      carryInputs[0],
      resultInputs[1],
      resultInputs[0],
    ];

    enableSequenceNavigation(entrySequence);

    checkButton.addEventListener("click", () => {
      const digitValues = resultInputs.map((input) => input.value.trim());

      if (digitValues.some((value) => value === "")) {
        feedback.textContent = "Please fill in all four result boxes.";
        feedback.className = "feedback error message";
        return;
      }

      const requiredCarryColumns = getRequiredCarryColumns();
      const hundredsCarry = carryInputs[0].value.trim();
      const tensCarry = carryInputs[1].value.trim();

      if (
        (requiredCarryColumns.hundreds && hundredsCarry === "") ||
        (requiredCarryColumns.tens && tensCarry === "")
      ) {
        feedback.textContent = "Please fill in required carry boxes.";
        feedback.className = "feedback error message";
        return;
      }

      const answerDigits = digitValues.join("");
      const typedAnswer = Number(answerDigits);

      if (typedAnswer === expectedSum) {
        feedback.textContent = "✓";
        feedback.className = "feedback success";
      } else {
        feedback.textContent = "✗";
        feedback.className = "feedback error";
      }
    });

    newProblemButton.addEventListener("click", () => {
      generateProblem();
      resultInputs[resultInputs.length - 1].focus();
    });

    generateProblem();
  </script>
</body>
</html>
