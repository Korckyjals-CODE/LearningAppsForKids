<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Apps for Kids</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      color: #111;
      background: #fff;
    }

    .page-card {
      max-width: 40rem;
      border: 2px solid #111;
      border-radius: 8px;
      padding: 1.5rem;
      background: #f9f9f9;
    }

    h1,
    h2 {
      margin-top: 0;
      margin-bottom: 0.5rem;
    }

      margin-bottom: 1.2rem;
    }

    .subject-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .subject-link {
      display: inline-block;
      font-size: 1rem;
      padding: 0.5rem 0.9rem;
      border: 1px solid #111;
      border-radius: 4px;
      color: inherit;
      text-decoration: none;

        <li><a class="subject-link" href="subjects/math.html">Math</a></li>
